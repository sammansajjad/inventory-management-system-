{% extends "base.html" %}
{% block content %}
<h2>Inventory</h2>

{% if items %}
<table>
    <tr>
        <th>SKU</th>
        <th>Quantity</th>
        <th>Stock In</th>
        <th>Stock Out</th>
    </tr>
    {% for item in items %}
    <tr>
        <td>{{ item.sku }}</td>
        <td>{{ item.quantity }}</td>
        <td>
            <form method="POST" action="/stock-in" style="display:inline">
                <input type="hidden" name="sku" value="{{ item.sku }}">
                <input type="number" name="quantity" min="1" value="1" style="width:60px">
                <button type="submit">+</button>
            </form>
        </td>
        <td>
            <form method="POST" action="/stock-out" style="display:inline">
                <input type="hidden" name="sku" value="{{ item.sku }}">
                <input type="number" name="quantity" min="1" value="1" style="width:60px">
                <button type="submit">−</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>No items yet. <a href="/add-item">Add one</a>.</p>
{% endif %}
{% endblock %}
